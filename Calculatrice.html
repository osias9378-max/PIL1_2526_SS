    <script>
        console.log(8.3)
        function ajouterChiffre(chiffre) {
            document.getElementById("ecran").value += chiffre;
        }
        function changerPage(nomPage) {
              console.log("Fonction appelée avec :", nomPage);
              document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
              document.querySelector('.' + nomPage).classList.add('active');
        }
        function toggleFonctions() {
              let menu = document.getElementById('menu-fonctions');
              menu.style.display = (menu.style.display === "none") ? "block" : "none";
       }
        let expressionCalcul="";
        let expressionCalculAfficher=""
        function ajouter(valeur) {
             expressionCalcul += valeur;
             let pageActive = document.querySelector('.page.active');
             pageActive.querySelector('.affichage').textContent = formatAffichage(expressionCalcul);
        }

        function effacer() {
             expressionCalcul = "";
             let pageActive = document.querySelector('.page.active');
             pageActive.querySelector('.affichage').textContent = "";
        }

        function calculer() {
             let resultat = eval(expressionCalcul);
             let pageActive = document.querySelector('.page.active');
             pageActive.querySelector('.affichage').textContent = resultat;
             expressionCalcul = resultat.toString();
        }

        let correspondances = {
             "Math.PI": "π",
             "Math.sqrt(": "√(",
             "Math.sin(": "sin(",
             "Math.cos(": "cos(",
             "Math.tan(": "tan(",
             "Math.log(": "log(",
             "**2": "²",
        };

        function formatAffichage(expr) {
             for (let cle in correspondances) {
                 expr = expr.replaceAll(cle, correspondances[cle]);
                }
             return expr;
        }

        window.onload = function() {
             let selectMenu = document.querySelector('select');
             changerPage(selectMenu.value);
        }
    </script>
